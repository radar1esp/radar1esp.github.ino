<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESP Radar BLE</title>
<style>
body{margin:0;font-family:system-ui;background:#0f1113;color:#f2f5f4;padding:20px}
main{max-width:850px;margin:auto}
header{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
button{border:0;border-radius:8px;padding:12px 16px;font-weight:700;background:#2dd4bf;color:#061210}
.card{border:1px solid #30383d;background:#171b1f;border-radius:8px;padding:16px;margin-top:14px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.big{font-size:clamp(3rem,12vw,6rem);font-weight:800;line-height:.95}
.muted{color:#a8b2b0}
table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #30383d;text-align:left}
@media(max-width:650px){.grid{grid-template-columns:1fr}button{width:100%}}
</style>
</head>
<body>
<main>
<header>
<h1>ESP Radar BLE</h1>
<button id="connect">Připojit radar</button>
</header>

<p id="status" class="muted">Čekám na připojení. Stránka musí běžet přes HTTPS.</p>

<section class="grid">
<div class="card"><div class="muted">Rychlost</div><div><span id="speed" class="big">0.0</span> km/h</div></div>
<div class="card"><div class="muted">Vzdálenost</div><div><span id="distance" class="big">0</span> m</div></div>
</section>

<section class="card">
<div>Cíl: <b id="target">ne</b></div>
<div>Úhel: <b id="angle">0</b>°</div>
<div>Rámce: <b id="frames">0</b></div>
<div>Raw rychlost: <b id="raw">0</b></div>
<div>Payload: <b id="payload">00 00 00 00 00 00 00 00 00 00</b></div>
</section>

<section class="card">
<h2>Historie rychlostí</h2>
<table>
<thead><tr><th>Čas</th><th>Rychlost</th><th>Vzdálenost</th><th>Úhel</th></tr></thead>
<tbody id="history"></tbody>
</table>
</section>
</main>

<script>
const SERVICE_UUID="6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const DATA_UUID="6e400003-b5a3-f393-e0a9-e50e24dcca9e";
const HISTORY_KEY="esp-radar-history-v4";

const btn=document.getElementById("connect");
const statusEl=document.getElementById("status");
let history=JSON.parse(localStorage.getItem(HISTORY_KEY)||"[]");

let lastFrame=0;
let lastDistance=null;
let lastSign="";

function $(id){return document.getElementById(id)}
function saveHistory(){localStorage.setItem(HISTORY_KEY,JSON.stringify(history))}

function signFromDirectionCode(code){
  if(code===1)return "+";
  if(code===2)return "-";
  return "";
}

function inferSign(hasTarget,distance,code,isNewFrame){
  if(!hasTarget){
    lastDistance=null;
    lastSign="";
    return "";
  }

  const fromRadar=signFromDirectionCode(code);
  if(fromRadar){
    if(isNewFrame)lastDistance=distance;
    lastSign=fromRadar;
    return fromRadar;
  }

  if(isNewFrame && lastDistance!==null){
    if(distance<lastDistance)lastSign="+";
    if(distance>lastDistance)lastSign="-";
  }

  if(isNewFrame)lastDistance=distance;
  return lastSign;
}

function signedSpeed(speed,sign){
  if(sign==="+"||sign==="-")return `${sign}${Math.abs(speed).toFixed(1)}`;
  return speed.toFixed(1);
}

function renderHistory(){
  $("history").innerHTML=history.map(x=>`
    <tr>
      <td>${x.time}</td>
      <td>${signedSpeed(x.speed,x.sign)} km/h</td>
      <td>${x.distance} m</td>
      <td>${x.angle}°</td>
    </tr>
  `).join("");
}

function addHistory(d){
  if(!d.hasTarget||!d.fresh||d.speed<=0)return;

  history.unshift({
    time:new Date().toLocaleTimeString("cs-CZ"),
    speed:d.speed,
    sign:d.sign,
    distance:d.distance,
    angle:d.angle
  });

  history=history.slice(0,100);
  saveHistory();
  renderHistory();
}

function decode(v){
  const flags=v.getUint8(0);
  const hasTarget=(flags&1)!==0;
  const freshFromEsp=(flags&2)!==0;
  const rawSpeed=v.getUint8(1);
  const distance=v.getUint8(2);
  const angle=v.getInt8(3);
  const directionCode=v.getUint8(4);
  const frames=v.getUint32(6,true);
  const isNewFrame=frames!==lastFrame;

  if(isNewFrame)lastFrame=frames;

  const sign=inferSign(hasTarget,distance,directionCode,isNewFrame);
  const payload=[];
  for(let i=10;i<20;i++){
    payload.push(v.getUint8(i).toString(16).padStart(2,"0").toUpperCase());
  }

  return {
    hasTarget,
    fresh:hasTarget&&freshFromEsp&&isNewFrame,
    speed:rawSpeed,
    raw:rawSpeed,
    sign,
    distance,
    angle,
    frames,
    payload:payload.join(" ")
  };
}

function show(d){
  $("speed").textContent=d.hasTarget?signedSpeed(d.speed,d.sign):"0.0";
  $("distance").textContent=d.hasTarget?d.distance:"0";
  $("target").textContent=d.hasTarget?"ano":"ne";
  $("angle").textContent=d.hasTarget?d.angle:"0";
  $("frames").textContent=d.frames;
  $("raw").textContent=d.raw;
  $("payload").textContent=d.payload;
  addHistory(d);
}

async function connect(){
  if(!window.isSecureContext){
    statusEl.textContent="Stránka musí být otevřená přes HTTPS.";
    return;
  }

  if(!navigator.bluetooth){
    statusEl.textContent="Tento prohlížeč nepodporuje Web Bluetooth.";
    return;
  }

  btn.disabled=true;
  statusEl.textContent="Vyber zařízení ESP-RADAR.";

  try{
    const device=await navigator.bluetooth.requestDevice({
      acceptAllDevices:true,
      optionalServices:[SERVICE_UUID]
    });

    device.addEventListener("gattserverdisconnected",()=>{
      btn.disabled=false;
      btn.textContent="Připojit radar";
      statusEl.textContent="Bluetooth odpojeno.";
    });

    const server=await device.gatt.connect();
    const service=await server.getPrimaryService(SERVICE_UUID);
    const ch=await service.getCharacteristic(DATA_UUID);

    ch.addEventListener("characteristicvaluechanged",e=>show(decode(e.target.value)));
    await ch.startNotifications();
    show(decode(await ch.readValue()));

    btn.textContent="Připojeno";
    statusEl.innerHTML=`Připojeno k <b>${device.name||"ESP-RADAR"}</b>`;
  }catch(e){
    console.error(e);
    btn.disabled=false;
    statusEl.textContent="Připojení se nepovedlo.";
  }
}

btn.onclick=connect;
renderHistory();
</script>
</body>
</html>
